spring.application.name=onnyth-server

# ==========================================
# Database Configuration (PostgreSQL)
# ==========================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Supabase Configuration
# ==========================================
supabase.url=${SUPABASE_URL:https://your-project.supabase.co}
supabase.anon-key=${SUPABASE_ANON_KEY:your-anon-key}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${supabase.url}/auth/v1

# ==========================================
# Spring Actuator Configuration
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

# Application info for /actuator/info endpoint
info.app.name=@project.name@
info.app.description=@project.description@
info.app.version=@project.version@

# ==========================================
# Swagger/OpenAPI Configuration
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ==========================================
# Logging Configuration
# ==========================================
logging.level.root=INFO
logging.level.com.onnyth=INFO

