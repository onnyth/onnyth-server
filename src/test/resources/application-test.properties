# ==========================================
# Test Profile Configuration
# ==========================================
# Active automatically when running tests via @ActiveProfiles("test")
# or spring.profiles.active=test

# JPA - update schema to prevent dropping tables after Testcontainers closes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=0

# Add connection validation for robust Testcontainer startups
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.maximum-pool-size=2

# Supabase - overridden per test class using WireMock port
# Integration tests set this dynamically via @DynamicPropertySource
supabase.url=http://localhost:9999
supabase.anon-key=test-anon-key
supabase.service-role-key=test-service-role-key
supabase.storage.bucket=profile-pics

# JWT issuer - points to WireMock in integration tests
# Overridden dynamically in tests that need it
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9999/auth/v1

# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Suppress noisy logs during tests
logging.level.root=WARN
logging.level.com.onnyth=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.testcontainers=WARN
logging.level.com.github.dockerjava=WARN

# Disable Actuator in tests
management.endpoints.web.exposure.include=health
